# fail2ban action: block IPs via ExaFS BGP RTBH
#
# Instalace:
#   cp action.d/exafs.conf /etc/fail2ban/action.d/exafs.conf
#   cp exafs_action.py /usr/local/bin/exafs_action.py
#   chmod +x /usr/local/bin/exafs_action.py
#   cp exafs.cfg.example /etc/fail2ban/exafs.cfg
#   # Upravte /etc/fail2ban/exafs.cfg (url, api_key, community)
#
# Použití v jail.local:
#   [ssh]
#   action = exafs

[Definition]

actionban = /usr/local/bin/exafs_action.py ban <ip> <bantime>

actionunban = /usr/local/bin/exafs_action.py unban <ip>

# Volitelné: vlastní cesta ke konfiguračnímu souboru
# actionban  = /usr/local/bin/exafs_action.py --config <config> ban <ip> <bantime>
# actionunban = /usr/local/bin/exafs_action.py --config <config> unban <ip>

[Init]

# Výchozí cesta ke konfiguračnímu souboru ExaFS
# (lze přepsat v jail.local přes actionban/actionunban s --config)
config = /etc/fail2ban/exafs.cfg
