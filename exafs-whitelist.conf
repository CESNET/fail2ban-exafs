# ExaFS fail2ban whitelist
# ============================================================
# IP adresy a sítě, které NIKDY nebudou blokovány přes ExaFS RTBH.
# Fail2ban tyto adresy přeskočí a ban nebude vytvořen.
#
# Formát:
#   - Jedna položka na řádek
#   - Podporována je notace CIDR (IPv4 i IPv6)
#   - Řádky začínající # jsou komentáře
#   - Prázdné řádky jsou ignorovány
#
# Umístění: /etc/fail2ban/exafs-whitelist.conf
# Oprávnění: chmod 600 /etc/fail2ban/exafs-whitelist.conf
#
# Soubor je načten při každém banu — změny se projeví okamžitě
# bez nutnosti restartu fail2ban (hot-reload).
# ============================================================

# ── Interní management síť ─────────────────────────────────
10.10.10.0/24

# ── Příklady dalších záznamů ───────────────────────────────
